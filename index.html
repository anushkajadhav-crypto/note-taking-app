<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>My Notes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  color: oklch(0.25 0.005 80);
  background: oklch(0.975 0.005 80);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: 'cv11', 'ss01';
}
button { font: inherit; color: inherit; background: none; border: 0; padding: 0; cursor: pointer; }
input, textarea { font: inherit; color: inherit; background: transparent; border: 0; outline: 0; resize: none; width: 100%; }
::placeholder { color: oklch(0.55 0.01 80); }

.masonry { column-gap: 14px; column-count: 4; }
@media (max-width: 1500px) { .masonry { column-count: 3; } }
@media (max-width: 1080px) { .masonry { column-count: 2; } }
@media (max-width: 720px)  { .masonry { column-count: 1; } }
.masonry > * { break-inside: avoid; margin-bottom: 14px; display: block; }
.masonry-header { column-span: all; }

.scroll::-webkit-scrollbar { width: 10px; height: 10px; }
.scroll::-webkit-scrollbar-thumb { background: oklch(0.85 0.005 80); border-radius: 6px; border: 2px solid oklch(0.975 0.005 80); }
.scroll::-webkit-scrollbar-thumb:hover { background: oklch(0.75 0.005 80); }

@keyframes mg-backdrop-in { from { opacity: 0 } to { opacity: 1 } }
@keyframes mg-modal-in { from { opacity: 0; transform: translateY(8px) scale(0.985) } to { opacity: 1; transform: translateY(0) scale(1) } }
@keyframes mg-pop-in { from { opacity: 0; transform: translateY(4px) scale(0.97) } to { opacity: 1; transform: translateY(0) scale(1) } }

.hover-bg:hover { background: oklch(0.94 0.005 80) !important; }
.hover-bg-dark:hover { background: rgba(0,0,0,0.06) !important; }
.hover-scale:hover { transform: scale(1.1) !important; }
.hover-bg-pin:hover { background: rgba(0,0,0,0.18) !important; }
.hover-bg-red:hover { background: oklch(0.95 0.03 25) !important; }
.hover-trash-btn:hover { background: oklch(0.94 0.03 25) !important; }
.hover-search-clear:hover { background: oklch(0.92 0.005 80) !important; }
.hover-new-note:hover { border-color: oklch(0.78 0.005 80) !important; box-shadow: 0 4px 14px -8px rgba(0,0,0,0.15) !important; }
.hover-modal-remove:hover { background: rgba(0,0,0,0.75) !important; }

.note-card { transition: box-shadow 180ms ease, border-color 180ms ease; }
.note-card:hover { border-color: oklch(0.78 0.005 80) !important; box-shadow: 0 6px 18px -8px rgba(0,0,0,0.18), 0 2px 4px rgba(0,0,0,0.04) !important; }
.note-card .pin-btn { opacity: 0; transition: opacity 180ms ease; }
.note-card:hover .pin-btn, .note-card .pin-btn.pinned { opacity: 1; }
.note-card .note-toolbar { opacity: 0; transition: opacity 180ms ease; }
.note-card:hover .note-toolbar { opacity: 1; }

.save-btn { padding: 6px 16px; font-size: 13px; font-weight: 600; border-radius: 6px; color: white; background: oklch(0.45 0.12 250); }
.save-btn:hover { background: oklch(0.4 0.14 250); }
.save-btn-lg { padding: 8px 18px; font-size: 13px; font-weight: 600; border-radius: 8px; color: white; background: oklch(0.45 0.12 250); }
.save-btn-lg:hover { background: oklch(0.4 0.14 250); }
</style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
"use strict";

const COLORS = {
  default:  { bg: '#ffffff',                  label: 'Default'  },
  ruby:     { bg: 'oklch(0.93 0.045 22)',     label: 'Ruby'     },
  amber:    { bg: 'oklch(0.935 0.045 75)',    label: 'Amber'    },
  citrine:  { bg: 'oklch(0.945 0.045 100)',   label: 'Citrine'  },
  emerald:  { bg: 'oklch(0.93 0.045 160)',    label: 'Emerald'  },
  teal:     { bg: 'oklch(0.93 0.045 200)',    label: 'Teal'     },
  sapphire: { bg: 'oklch(0.93 0.045 250)',    label: 'Sapphire' },
  amethyst: { bg: 'oklch(0.93 0.045 300)',    label: 'Amethyst' },
  rose:     { bg: 'oklch(0.93 0.045 340)',    label: 'Rose'     },
  slate:    { bg: 'oklch(0.93 0.012 250)',    label: 'Slate'    },
  bone:     { bg: 'oklch(0.94 0.015 80)',     label: 'Bone'     },
  pearl:    { bg: 'oklch(0.955 0.005 240)',   label: 'Pearl'    },
};
const COLOR_KEYS = Object.keys(COLORS);

function svg(paths, size = 20, fill = 'none') {
  const pathEls = paths.map(d => `<path d="${d}"/>`).join('');
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="${fill}" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex-shrink:0">${pathEls}</svg>`;
}
function pinFilledSvg(size = 20) {
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round" style="display:block;flex-shrink:0"><path d="M12 17v5"/><path d="M5 9l3-3 4 1 4-1 3 3-1 4 1 4-3 0H8l-3 0 1-4z" fill="currentColor"/></svg>`;
}

const ICONS = {
  menu:        svg(['M3 6h18','M3 12h18','M3 18h18']),
  search:      svg(['M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16Z','m21 21-4.3-4.3']),
  x:           svg(['M18 6 6 18','m6 6 12 12']),
  xSmall:      svg(['M18 6 6 18','m6 6 12 12'], 16),
  grid:        svg(['M3 3h7v7H3z','M14 3h7v7h-7z','M3 14h7v7H3z','M14 14h7v7h-7z']),
  list:        svg(['M3 6h18','M3 12h18','M3 18h18']),
  plus:        svg(['M12 5v14','M5 12h14']),
  palette:     svg(['M12 2a10 10 0 0 0 0 20c1.7 0 2.5-.8 2.5-2 0-.6-.2-1-.5-1.4-.3-.5-.5-.8-.5-1.3 0-.7.5-1.3 1.5-1.3H17a5 5 0 0 0 5-5c0-5-4.5-9-10-9z','M7 13a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z','M10 8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z','M15 8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z']),
  paletteSmall:svg(['M12 2a10 10 0 0 0 0 20c1.7 0 2.5-.8 2.5-2 0-.6-.2-1-.5-1.4-.3-.5-.5-.8-.5-1.3 0-.7.5-1.3 1.5-1.3H17a5 5 0 0 0 5-5c0-5-4.5-9-10-9z','M7 13a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z','M10 8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z','M15 8a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3z'], 16),
  archive:     svg(['M3 3h18v4H3z','M5 7v13a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7','M10 12h4']),
  archiveSmall:svg(['M3 3h18v4H3z','M5 7v13a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7','M10 12h4'], 16),
  trash:       svg(['M3 6h18','M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2','M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6','M10 11v6','M14 11v6']),
  trashSmall:  svg(['M3 6h18','M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2','M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6','M10 11v6','M14 11v6'], 16),
  note:        svg(['M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z','M14 2v6h6','M8 13h8','M8 17h5']),
  pinOutline:  svg(['M12 17v5','M5 9l3-3 4 1 4-1 3 3-1 4 1 4-3 0H8l-3 0 1-4z']),
  pinOutline16:svg(['M12 17v5','M5 9l3-3 4 1 4-1 3 3-1 4 1 4-3 0H8l-3 0 1-4z'], 16),
  pinOutline18:svg(['M12 17v5','M5 9l3-3 4 1 4-1 3 3-1 4 1 4-3 0H8l-3 0 1-4z'], 18),
  pinFilled16: pinFilledSvg(16),
  pinFilled18: pinFilledSvg(18),
  unarchive:   svg(['M3 3h18v4H3z','M5 7v13a1 1 0 0 0 1 1h12a1 1 0 0 0 1-1V7','M12 16V11','m9 13 3-3 3 3'], 14),
  image:       svg(['M3 5h18v14H3z','M3 16l5-5 4 4 3-3 6 6','M8.5 10.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z']),
  imageSmall:  svg(['M3 5h18v14H3z','M3 16l5-5 4 4 3-3 6 6','M8.5 10.5a1.5 1.5 0 1 1 0-3 1.5 1.5 0 0 1 0 3z'], 16),
  imageOff:    svg(['M3 5h18v14H3z','M3 16l5-5 4 4 3-3 6 6','M2 2l20 20'], 16),
};

const t = Date.now();
let state = {
  notes: [
    { id: 'n1', title: 'Q3 launch checklist', content: 'Press list confirmed.\nRehearsal Thursday 2pm with eng.\nPricing copy needs final read from legal.\nLanding hero locked by Friday EOD.', color: 'amber', pinned: true, archived: false, trashed: false, image: null, updatedAt: t - 100 },
    { id: 'n2', title: 'On the editorial voice', content: 'Less hedging. Cut the phrase "we believe" entirely. Lead with verbs. Numbers belong in the body, not the headline.', color: 'sapphire', pinned: true, archived: false, trashed: false, image: null, updatedAt: t - 200 },
    { id: 'n3', title: 'Books to read', content: 'The Information — James Gleick\nA Pattern Language — Alexander\nThe Design of Everyday Things — Norman\nWays of Seeing — Berger\nThe Art of Doing Science and Engineering — Hamming', color: 'emerald', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 300 },
    { id: 'n3b', title: 'Studio window, morning', content: 'The first hour, before anyone else is up.', image: 'data:image/svg+xml;utf8,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="%23f9c97a"/><stop offset="1" stop-color="%23d97a5d"/></linearGradient></defs><rect width="400" height="240" fill="url(%23g)"/><circle cx="320" cy="70" r="36" fill="%23fde7a8" opacity="0.85"/><path d="M0 180 L80 150 L160 175 L240 140 L320 165 L400 145 L400 240 L0 240 Z" fill="%23613a2a" opacity="0.55"/><path d="M0 210 L100 195 L200 215 L300 200 L400 210 L400 240 L0 240 Z" fill="%23351c14" opacity="0.7"/></svg>'), color: 'default', pinned: false, archived: false, trashed: false, updatedAt: t - 350 },
    { id: 'n4', title: '', content: 'Ask David about the Tuesday standup time — he mentioned wanting to push it to Wednesdays.', color: 'default', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 400 },
    { id: 'n5', title: 'Coffee shops, ranked', content: 'Felix — bench seating, good wifi, loud at lunch.\nMonastery — quiet, slow espresso, no outlets near the window.\nNorth Garden — best light in the morning, closes at 3.', color: 'rose', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 500 },
    { id: 'n6', title: 'Onboarding rewrite', content: 'Three screens, not five.\n\nThe first screen should answer "what is this for" in under ten words. The second screen earns the right to ask for an email by showing the value once. The third screen is the empty canvas itself.\n\nWe keep adding things to make new users feel oriented, but the result is the opposite. New users want to start, not to be taught.', color: 'pearl', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 600 },
    { id: 'n7', title: 'Saturday', content: 'Farmers market early. Library by 11. Lunch with Mara. Hardware store for the door hinge.', color: 'citrine', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 700 },
    { id: 'n8', title: 'Pricing — open questions', content: 'Per-seat vs per-workspace at the small-team end? Annual discount steepness? What’s our story for nonprofits?', color: 'amethyst', pinned: false, archived: false, trashed: false, image: null, updatedAt: t - 800 },
    { id: 'n9', title: 'Quote — Eames', content: 'The details are not the details. They make the design.', color: 'slate', pinned: false, archived: true, trashed: false, image: null, updatedAt: t - 900 },
    { id: 'n10', title: 'Old blog draft', content: 'Intro that I keep meaning to rewrite. Saving the bones here for later.', color: 'default', pinned: false, archived: false, trashed: true, image: null, updatedAt: t - 1000 },
  ],
  view: 'notes',
  searchQuery: '',
  viewMode: 'grid',
  sidebarCollapsed: false,
  pickerOpenFor: null,
  editorOpen: false,
  editorDraft: null,
  editorPickerOpen: false,
  newNoteExpanded: false,
  newDraft: { title: '', content: '', color: 'default', image: null },
  newColorPickerOpen: false,
};

function setState(update) {
  if (typeof update === 'function') {
    const result = update(state);
    if (!result) return;
    Object.assign(state, result);
  } else {
    Object.assign(state, update);
  }
  render();
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function getFilteredNotes() {
  const { notes, view, searchQuery } = state;
  let list = notes.filter(n => {
    if (view === 'notes') return !n.archived && !n.trashed;
    if (view === 'archive') return n.archived && !n.trashed;
    if (view === 'trash') return n.trashed;
    return true;
  });
  if (searchQuery.trim()) {
    const q = searchQuery.trim().toLowerCase();
    list = list.filter(n =>
      (n.title || '').toLowerCase().includes(q) ||
      (n.content || '').toLowerCase().includes(q)
    );
  }
  return list;
}

function colorPickerHTML(activeColor, context, noteId) {
  return COLOR_KEYS.map(key => {
    const c = COLORS[key];
    const border = key === activeColor ? 'oklch(0.3 0.005 80)' : 'rgba(0,0,0,0.12)';
    const size = context === 'editor' ? 28 : context === 'new' ? 26 : 24;
    return `<button onclick="pickColor('${context}', '${key}'${noteId ? ", '"+noteId+"'" : ''})" title="${c.label}" aria-label="${c.label}" class="hover-scale" style="width:${size}px;height:${size}px;border-radius:50%;background:${c.bg};border:1.5px solid ${border};cursor:pointer;transition:transform 100ms ease;"></button>`;
  }).join('');
}

function noteCardHTML(n, isGrid) {
  const colorEntry = COLORS[n.color] || COLORS.default;
  const isDefault = n.color === 'default';
  const isActive = state.view === 'notes';
  const isArchived = state.view === 'archive';
  const isTrashed = state.view === 'trash';
  const pickerOpen = state.pickerOpenFor === n.id;
  const bg = colorEntry.bg;
  const borderColor = isDefault ? 'oklch(0.9 0.005 80)' : 'rgba(0,0,0,0.07)';
  const pinColor = n.image ? 'white' : (n.pinned ? 'oklch(0.3 0.005 80)' : 'oklch(0.45 0.01 80)');
  const pinIcon = n.pinned ? ICONS.pinFilled16 : ICONS.pinOutline16;
  const pinBtnBg = n.image ? 'rgba(0,0,0,0.4)' : 'transparent';
  const pinnedClass = n.pinned ? ' pinned' : '';

  if (isGrid) {
    return `<div onclick="openEditor('${n.id}')" class="note-card" style="background:${bg};border:1px solid ${borderColor};border-radius:10px;padding:16px 18px 12px;cursor:pointer;position:relative;overflow:hidden;">
      ${n.image ? `<img src="${esc(n.image)}" alt="" style="display:block;width:calc(100% + 36px);margin:-16px -18px 12px;max-height:240px;object-fit:cover;"/>` : ''}
      <button onclick="event.stopPropagation();togglePin('${n.id}')" aria-label="Pin" class="pin-btn hover-bg-pin${pinnedClass}" style="position:absolute;top:8px;right:8px;width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:${pinColor};background:${pinBtnBg};">${pinIcon}</button>
      ${n.title ? `<h3 style="font-size:15px;font-weight:600;letter-spacing:-0.005em;margin:0 28px 6px 0;line-height:1.35;color:oklch(0.22 0.005 80);word-break:break-word;">${esc(n.title)}</h3>` : ''}
      <p style="font-size:13.5px;line-height:1.55;margin:0;color:oklch(0.28 0.005 80);white-space:pre-wrap;word-break:break-word;max-height:240px;overflow:hidden;">${esc(n.content || ' ')}</p>
      <div class="note-toolbar" style="display:flex;align-items:center;gap:2px;margin-top:10px;min-height:28px;">
        ${isActive ? `
          <button onclick="event.stopPropagation();toggleCardPicker('${n.id}')" aria-label="Color" class="hover-bg-dark" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.paletteSmall}</button>
          ${n.image ? `<button onclick="event.stopPropagation();removeNoteImage('${n.id}')" aria-label="Remove image" title="Remove image" class="hover-bg-dark" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.imageOff}</button>` : ''}
          <button onclick="event.stopPropagation();archiveNote('${n.id}')" aria-label="Archive" class="hover-bg-dark" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.archiveSmall}</button>
          <button onclick="event.stopPropagation();trashNote('${n.id}')" aria-label="Delete" class="hover-bg-dark" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.trashSmall}</button>
        ` : ''}
        ${isArchived ? `
          <button onclick="event.stopPropagation();unarchiveNote('${n.id}')" class="hover-bg-dark" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;color:oklch(0.35 0.005 80);">${ICONS.unarchive}Restore</button>
          <button onclick="event.stopPropagation();trashNote('${n.id}')" class="hover-bg-dark" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;color:oklch(0.35 0.005 80);">${ICONS.trashSmall}Delete</button>
        ` : ''}
        ${isTrashed ? `
          <button onclick="event.stopPropagation();restoreFromTrash('${n.id}')" class="hover-bg-dark" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;color:oklch(0.35 0.005 80);">${ICONS.unarchive}Restore</button>
          <button onclick="event.stopPropagation();purgeNote('${n.id}')" class="hover-bg-red" style="display:inline-flex;align-items:center;gap:6px;padding:6px 10px;border-radius:6px;font-size:12px;font-weight:500;color:oklch(0.4 0.08 25);">Delete forever</button>
        ` : ''}
      </div>
      ${pickerOpen ? `<div onclick="event.stopPropagation()" style="margin-top:8px;padding:10px;border-top:1px solid rgba(0,0,0,0.08);display:flex;flex-wrap:wrap;gap:6px;animation:mg-pop-in 140ms ease;">${colorPickerHTML(n.color, 'card', n.id)}</div>` : ''}
    </div>`;
  }

  return `<div onclick="openEditor('${n.id}')" class="note-card" style="background:${bg};border:1px solid ${borderColor};border-radius:10px;padding:14px 18px;cursor:pointer;display:flex;align-items:flex-start;gap:16px;">
    ${n.image ? `<img src="${esc(n.image)}" alt="" style="width:72px;height:72px;object-fit:cover;border-radius:6px;flex-shrink:0;"/>` : ''}
    <div style="flex:1;min-width:0;">
      ${n.title ? `<div style="font-size:14.5px;font-weight:600;margin-bottom:4px;color:oklch(0.22 0.005 80);">${esc(n.title)}</div>` : ''}
      <div style="font-size:13px;line-height:1.5;color:oklch(0.4 0.005 80);white-space:pre-wrap;max-height:60px;overflow:hidden;">${esc(n.content || ' ')}</div>
    </div>
    ${isActive ? `<button onclick="event.stopPropagation();togglePin('${n.id}')" aria-label="Pin" class="pin-btn hover-bg-dark${pinnedClass}" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:${pinColor};flex-shrink:0;">${pinIcon}</button>` : ''}
    ${n.pinned && !isActive ? `<button onclick="event.stopPropagation();togglePin('${n.id}')" aria-label="Pin" class="pin-btn hover-bg-dark${pinnedClass}" style="width:28px;height:28px;border-radius:6px;display:inline-flex;align-items:center;justify-content:center;color:${pinColor};flex-shrink:0;">${pinIcon}</button>` : ''}
  </div>`;
}

function render() {
  const s = state;
  const filtered = getFilteredNotes();
  const pinned = filtered.filter(n => n.pinned);
  const unpinned = filtered.filter(n => !n.pinned);
  const isNotesView = s.view === 'notes';
  const isArchiveView = s.view === 'archive';
  const isTrashView = s.view === 'trash';
  const hasSearch = s.searchQuery.trim().length > 0;
  const notesCount = s.notes.filter(n => !n.archived && !n.trashed).length;
  const archiveCount = s.notes.filter(n => n.archived && !n.trashed).length;
  const trashCount = s.notes.filter(n => n.trashed).length;
  const sidebarExpanded = !s.sidebarCollapsed;
  const sidebarWidth = s.sidebarCollapsed ? '72px' : '244px';

  let viewTitle, viewSubtitle, emptyTitle, emptyBody, emptyIconKey;
  if (isNotesView) {
    viewTitle = hasSearch ? 'Search' : 'All notes';
    viewSubtitle = hasSearch ? `${filtered.length} match${filtered.length === 1 ? '' : 'es'} for “${esc(s.searchQuery)}”` : `${filtered.length} note${filtered.length === 1 ? '' : 's'}`;
    emptyTitle = hasSearch ? 'No matches' : 'No notes yet';
    emptyBody = hasSearch ? 'Try a different search term, or clear the search.' : 'Notes you add will show up here. Try the Take a note bar above.';
    emptyIconKey = 'note';
  } else if (isArchiveView) {
    viewTitle = 'Archive';
    viewSubtitle = `${filtered.length} archived`;
    emptyTitle = 'Archive is empty';
    emptyBody = 'Notes you archive will live here, out of the way but not gone.';
    emptyIconKey = 'archive';
  } else {
    viewTitle = 'Trash';
    viewSubtitle = `${filtered.length} in trash`;
    emptyTitle = 'Trash is empty';
    emptyBody = 'Deleted notes wait here until you empty the trash.';
    emptyIconKey = 'trash';
  }

  const showPinnedHeader = pinned.length > 0 && isNotesView;
  const showOthersHeader = pinned.length > 0 && unpinned.length > 0 && isNotesView;

  const sidebarItems = [
    { key: 'notes', label: 'Notes', icon: ICONS.note, count: notesCount },
    { key: 'archive', label: 'Archive', icon: ICONS.archive, count: archiveCount },
    { key: 'trash', label: 'Trash', icon: ICONS.trash, count: trashCount },
  ];

  const newDraftColor = COLORS[s.newDraft.color] || COLORS.default;
  const editorDraftColor = s.editorDraft ? (COLORS[s.editorDraft.color] || COLORS.default) : COLORS.default;

  const viewToggleIcon = s.viewMode === 'grid' ? ICONS.list : ICONS.grid;
  const viewModeLabel = s.viewMode === 'grid' ? 'Switch to list view' : 'Switch to grid view';

  let html = `<div style="display:flex;flex-direction:column;height:100vh;min-height:100vh;overflow:hidden;">`;

  html += `<header style="display:flex;align-items:center;gap:16px;padding:0 20px;height:64px;flex-shrink:0;border-bottom:1px solid oklch(0.92 0.005 80);background:oklch(0.985 0.005 80);position:relative;z-index:5;">

  html += `<div style="display:flex;flex:1;min-height:0;">`;

  html += `<aside style="width:${sidebarWidth};flex-shrink:0;border-right:1px solid oklch(0.92 0.005 80);padding:16px 10px;transition:width 200ms ease;background:oklch(0.985 0.005 80);overflow:hidden;">

  });
  html += `</nav>`;
  if (sidebarExpanded) {
    html += `<div style="margin-top:28px;padding:0 14px;">
      <div style="font-size:10px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.6 0.01 80);margin-bottom:10px;">Workspace</div>

  html += `</aside>`;

  html += `<main class="scroll" style="flex:1;overflow-y:auto;padding:32px 32px 80px;">

  html += `<div style="display:flex;align-items:baseline;gap:16px;margin-bottom:28px;">

    <div style="flex:1;"></div>
    ${isTrashView && trashCount > 0 ? `<button onclick="emptyTrash()" class="hover-trash-btn" style="display:inline-flex;align-items:center;gap:8px;padding:8px 14px;border-radius:8px;font-size:13px;font-weight:500;color:oklch(0.4 0.08 25);border:1px solid oklch(0.85 0.04 25);background:oklch(0.97 0.02 25);">
      <span>${ICONS.trash}</span>Empty trash

  if (isNotesView) {
    html += `<div style="max-width:640px;margin:0 auto 36px;">`;
    if (s.newNoteExpanded) {
      html += `<div style="background:${newDraftColor.bg};border:1px solid oklch(0.88 0.005 80);border-radius:12px;box-shadow:0 4px 16px -8px rgba(0,0,0,0.18);padding:16px 18px 10px;overflow:hidden;">`;
      if (s.newDraft.image) {
        html += `<div style="margin:-16px -18px 12px;position:relative;">

        <textarea id="newContentInput" placeholder="Take a note…" oninput="onNewContentChange(this.value)" rows="3" style="font-size:14px;line-height:1.55;padding:4px 0;min-height:72px;">${esc(s.newDraft.content)}</textarea>
        <div style="display:flex;align-items:center;gap:4px;margin-top:6px;position:relative;">
          <button onclick="toggleNewColorPicker()" aria-label="Color" class="hover-bg-dark" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;color:oklch(0.4 0.01 80);">${ICONS.palette}</button>
          <label aria-label="Add image" class="hover-bg-dark" style="display:inline-flex;align-items:center;justify-content:center;width:32px;height:32px;border-radius:6px;color:oklch(0.4 0.01 80);cursor:pointer;">
            ${ICONS.image}
            <input type="file" accept="image/*" onchange="onNewImagePick(this)" style="display:none;width:0;height:0;"/>
          </label>
          <div style="flex:1;"></div>
          <button onclick="closeNewNote()" class="hover-bg-dark" style="padding:6px 16px;font-size:13px;font-weight:600;border-radius:6px;color:oklch(0.25 0.005 80);">Close</button>

      if (s.newColorPickerOpen) {
        html += `<div style="margin-top:8px;padding:10px;border-top:1px solid rgba(0,0,0,0.08);display:flex;flex-wrap:wrap;gap:6px;">${colorPickerHTML(s.newDraft.color, 'new')}</div>`;
      }
      html += `</div>`;
    } else {
      html += `<button onclick="openNewNote()" class="hover-new-note" style="display:flex;align-items:center;gap:12px;width:100%;padding:14px 18px;background:white;border:1px solid oklch(0.9 0.005 80);border-radius:12px;font-size:14px;color:oklch(0.5 0.01 80);text-align:left;">
        <span style="display:inline-flex;color:oklch(0.5 0.01 80);">${ICONS.plus}</span>
        <span style="flex:1;">Take a note…</span>
      </button>`;
    }
    html += `</div>`;
  }

  if (filtered.length === 0) {
    html += `<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 24px;text-align:center;">
      <div style="color:oklch(0.78 0.01 80);margin-bottom:18px;">${ICONS[emptyIconKey]}</div>
      <h2 style="font-size:20px;font-weight:600;letter-spacing:-0.01em;margin:0 0 6px;color:oklch(0.35 0.005 80);">${emptyTitle}</h2>
      <p style="font-size:14px;color:oklch(0.55 0.01 80);margin:0;max-width:320px;line-height:1.55;">${emptyBody}</p>
    </div>`;
  }

  if (s.viewMode === 'grid' && filtered.length > 0) {
    html += `<div class="masonry">`;
    if (showPinnedHeader) html += `<div class="masonry-header" style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.01 80);padding:0 4px 12px;">Pinned</div>`;
    pinned.forEach(n => { html += noteCardHTML(n, true); });
    if (showOthersHeader) html += `<div class="masonry-header" style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.01 80);padding:16px 4px 12px;">Others</div>`;
    unpinned.forEach(n => { html += noteCardHTML(n, true); });
    html += `</div>`;
  }

  if (s.viewMode === 'list' && filtered.length > 0) {
    html += `<div style="max-width:720px;margin:0 auto;display:flex;flex-direction:column;gap:10px;">`;
    if (showPinnedHeader) html += `<div style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.01 80);padding:0 4px 4px;">Pinned</div>`;
    pinned.forEach(n => { html += noteCardHTML(n, false); });
    if (showOthersHeader) html += `<div style="font-size:11px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:oklch(0.55 0.01 80);padding:12px 4px 4px;">Others</div>`;
    unpinned.forEach(n => { html += noteCardHTML(n, false); });
    html += `</div>`;
  }

  html += `</div></main></div>`;

  if (s.editorOpen && s.editorDraft) {
    const d = s.editorDraft;
    const edBg = editorDraftColor.bg;
    const edPinColor = d.pinned ? 'oklch(0.3 0.005 80)' : 'oklch(0.5 0.01 80)';
    const edPinIcon = d.pinned ? ICONS.pinFilled18 : ICONS.pinOutline18;

    html += `<div onclick="closeEditor()" style="position:fixed;inset:0;background:rgba(20,20,24,0.42);display:flex;align-items:center;justify-content:center;padding:40px 24px;z-index:50;animation:mg-backdrop-in 160ms ease;">
      <div onclick="event.stopPropagation()" style="background:${edBg};border-radius:14px;box-shadow:0 24px 64px -16px rgba(0,0,0,0.35),0 2px 8px rgba(0,0,0,0.1);width:100%;max-width:640px;max-height:84vh;display:flex;flex-direction:column;animation:mg-modal-in 200ms cubic-bezier(.2,.7,.3,1);overflow:hidden;">`;
    if (d.image) {
      html += `<div style="position:relative;flex-shrink:0;">
        <img src="${esc(d.image)}" alt="" style="display:block;width:100%;max-height:320px;object-fit:cover;"/>
        <button onclick="removeEditorImage()" aria-label="Remove image" class="hover-modal-remove" style="position:absolute;top:10px;right:10px;width:32px;height:32px;border-radius:50%;background:rgba(0,0,0,0.55);color:white;display:inline-flex;align-items:center;justify-content:center;">${ICONS.x}</button>
      </div>`;
    }
    html += `<div style="padding:22px 24px 0;display:flex;align-items:flex-start;gap:8px;">
        <input id="editorTitleInput" type="text" placeholder="Title" value="${esc(d.title)}" oninput="onEditorTitleChange(this.value)" style="font-size:18px;font-weight:600;letter-spacing:-0.01em;padding:4px 0;"/>
        <button onclick="toggleEditorPin()" aria-label="Pin" class="hover-bg-dark" style="width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:${edPinColor};flex-shrink:0;">${edPinIcon}</button>
      </div>
      <div style="padding:8px 24px 16px;flex:1;overflow-y:auto;min-height:0;" class="scroll">
        <textarea id="editorContentInput" placeholder="Take a note…" oninput="onEditorContentChange(this.value)" rows="8" style="font-size:14.5px;line-height:1.6;min-height:200px;padding:4px 0;">${esc(d.content)}</textarea>
      </div>
      <div style="padding:10px 14px 14px;display:flex;align-items:center;gap:4px;border-top:1px solid rgba(0,0,0,0.06);position:relative;">
        <button onclick="toggleEditorPicker()" aria-label="Color" class="hover-bg-dark" style="width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.palette}</button>
        <label aria-label="Add image" class="hover-bg-dark" style="width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);cursor:pointer;">
          ${ICONS.image}
          <input type="file" accept="image/*" onchange="onEditorImagePick(this)" style="display:none;width:0;height:0;"/>
        </label>
        <button onclick="archiveFromEditor()" aria-label="Archive" class="hover-bg-dark" style="width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.archive}</button>
        <button onclick="trashFromEditor()" aria-label="Delete" class="hover-bg-dark" style="width:36px;height:36px;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;color:oklch(0.4 0.01 80);">${ICONS.trash}</button>
        <div style="flex:1;"></div>
        <button onclick="closeEditor()" class="hover-bg-dark" style="padding:8px 18px;font-size:13px;font-weight:600;border-radius:8px;color:oklch(0.22 0.005 80);">Close</button>
        <button onclick="saveEditor()" class="save-btn-lg">Save</button>
        ${s.editorPickerOpen ? `<div style="position:absolute;bottom:100%;left:14px;margin-bottom:6px;background:white;border-radius:10px;box-shadow:0 8px 24px rgba(0,0,0,0.16),0 2px 4px rgba(0,0,0,0.06);padding:10px;display:flex;gap:6px;flex-wrap:wrap;max-width:280px;animation:mg-pop-in 140ms ease;">${colorPickerHTML(d.color, 'editor')}</div>` : ''}
      </div>
    </div></div>`;
  }

  html += `</div>`;

  document.getElementById('app').innerHTML = html;
  restoreFocus();
}

let _focusTarget = null;
let _focusCursor = null;

function saveFocus() {
  const el = document.activeElement;
  if (el && (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') && el.id) {
    _focusTarget = el.id;
    _focusCursor = el.selectionStart;
  } else {
    _focusTarget = null;
    _focusCursor = null;
  }
}

function restoreFocus() {
  if (_focusTarget) {
    const el = document.getElementById(_focusTarget);
    if (el) {
      el.focus();
      if (_focusCursor != null && el.setSelectionRange) {
        el.setSelectionRange(_focusCursor, _focusCursor);
      }
    }
    _focusTarget = null;
    _focusCursor = null;
  }
}

window.toggleSidebar = () => setState(s => ({ sidebarCollapsed: !s.sidebarCollapsed }));
window.toggleViewMode = () => setState(s => ({ viewMode: s.viewMode === 'grid' ? 'list' : 'grid' }));
window.setView = (view) => setState({ view, searchQuery: '', pickerOpenFor: null });
window.onSearchChange = (v) => { saveFocus(); setState({ searchQuery: v }); };
window.clearSearch = () => setState({ searchQuery: '' });

window.togglePin = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, pinned: !n.pinned, updatedAt: Date.now() } : n),
}));
window.archiveNote = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, archived: true, pinned: false, updatedAt: Date.now() } : n),
  pickerOpenFor: null,
}));
window.unarchiveNote = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, archived: false, updatedAt: Date.now() } : n),
}));
window.trashNote = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, trashed: true, pinned: false, archived: false, updatedAt: Date.now() } : n),
  pickerOpenFor: null,
}));
window.restoreFromTrash = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, trashed: false, updatedAt: Date.now() } : n),
}));
window.purgeNote = (id) => setState(s => ({ notes: s.notes.filter(n => n.id !== id) }));
window.emptyTrash = () => setState(s => ({ notes: s.notes.filter(n => !n.trashed) }));
window.setColor = (id, color) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, color, updatedAt: Date.now() } : n),
  pickerOpenFor: null,
}));
window.removeNoteImage = (id) => setState(s => ({
  notes: s.notes.map(n => n.id === id ? { ...n, image: null, updatedAt: Date.now() } : n),
}));

window.toggleCardPicker = (id) => setState(s => ({ pickerOpenFor: s.pickerOpenFor === id ? null : id }));

window.openNewNote = () => setState({ newNoteExpanded: true });
window.closeNewNote = () => {
  setState({ newNoteExpanded: false, newDraft: { title: '', content: '', color: 'default', image: null }, newColorPickerOpen: false });
};
window.saveNewNote = () => {
  setState(s => {
    const { title, content, color, image } = s.newDraft;
    const next = { newNoteExpanded: false, newDraft: { title: '', content: '', color: 'default', image: null }, newColorPickerOpen: false };
    if (title.trim() || content.trim() || image) {
      const id = 'n' + Date.now();
      next.notes = [{ id, title: title.trim(), content: content.trim(), color, image: image || null, pinned: false, archived: false, trashed: false, updatedAt: Date.now() }, ...s.notes];
    }
    return next;
  });
};
window.onNewTitleChange = (v) => { saveFocus(); setState(s => ({ newDraft: { ...s.newDraft, title: v } })); };
window.onNewContentChange = (v) => { saveFocus(); setState(s => ({ newDraft: { ...s.newDraft, content: v } })); };
window.toggleNewColorPicker = () => setState(s => ({ newColorPickerOpen: !s.newColorPickerOpen }));
window.removeNewImage = () => setState(s => ({ newDraft: { ...s.newDraft, image: null } }));

window.onNewImagePick = async (input) => {
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => setState(s => ({ newDraft: { ...s.newDraft, image: reader.result }, newNoteExpanded: true }));
  reader.readAsDataURL(file);
};

window.openEditor = (id) => {
  const n = state.notes.find(x => x.id === id);
  if (!n) return;
  setState({ editorOpen: true, editorDraft: { ...n }, editorPickerOpen: false, pickerOpenFor: null });
};
window.closeEditor = () => {
  setState({ editorOpen: false, editorDraft: null, editorPickerOpen: false });
};
window.saveEditor = () => {
  setState(s => {
    if (!s.editorDraft) return { editorOpen: false, editorDraft: null, editorPickerOpen: false };
    const d = s.editorDraft;
    const notes = s.notes.map(n => n.id === d.id ? { ...n, title: d.title, content: d.content, color: d.color, image: d.image || null, pinned: d.pinned, archived: d.archived, trashed: d.trashed, updatedAt: Date.now() } : n);
    return { editorOpen: false, editorDraft: null, editorPickerOpen: false, notes };
  });
};
window.onEditorTitleChange = (v) => { saveFocus(); setState(s => ({ editorDraft: { ...s.editorDraft, title: v } })); };
window.onEditorContentChange = (v) => { saveFocus(); setState(s => ({ editorDraft: { ...s.editorDraft, content: v } })); };
window.toggleEditorPin = () => setState(s => ({ editorDraft: { ...s.editorDraft, pinned: !s.editorDraft.pinned } }));
window.toggleEditorPicker = () => setState(s => ({ editorPickerOpen: !s.editorPickerOpen }));
window.removeEditorImage = () => setState(s => ({ editorDraft: { ...s.editorDraft, image: null } }));

window.onEditorImagePick = async (input) => {
  const file = input.files && input.files[0];
  input.value = '';
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => setState(s => ({ editorDraft: { ...s.editorDraft, image: reader.result } }));
  reader.readAsDataURL(file);
};

window.archiveFromEditor = () => {
  setState(s => {
    const d = s.editorDraft;
    const notes = s.notes.map(n => n.id === d.id ? { ...n, title: d.title, content: d.content, color: d.color, image: d.image || null, archived: true, pinned: false, trashed: false, updatedAt: Date.now() } : n);
    return { editorOpen: false, editorDraft: null, editorPickerOpen: false, notes };
  });
};
window.trashFromEditor = () => {
  setState(s => {
    const d = s.editorDraft;
    const notes = s.notes.map(n => n.id === d.id ? { ...n, title: d.title, content: d.content, color: d.color, image: d.image || null, trashed: true, pinned: false, archived: false, updatedAt: Date.now() } : n);
    return { editorOpen: false, editorDraft: null, editorPickerOpen: false, notes };
  });
};

window.pickColor = (context, key, noteId) => {
  if (context === 'new') {
    setState(s => ({ newDraft: { ...s.newDraft, color: key }, newColorPickerOpen: false }));
  } else if (context === 'editor') {
    setState(s => ({ editorDraft: { ...s.editorDraft, color: key }, editorPickerOpen: false }));
  } else if (context === 'card' && noteId) {
    window.setColor(noteId, key);
  }
};

document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (state.editorOpen) closeEditor();
    else if (state.newNoteExpanded) closeNewNote();
  }
});

render();
})();
</script>
